name: portfolio-web-ci

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: portfolio-web-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.3
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm exec playwright install --with-deps chromium
      - run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - run: pnpm build
      - run: pnpm test:e2e
        env:
          CI: true
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: preview-playwright-artifacts
          path: |
            artifacts/playwright
            playwright-report
            !artifacts/playwright/**/*.zip
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: preview-linux-visual-snapshots
          path: tests/e2e/visual-regression.spec.ts-snapshots/*-linux-canonical-chromium.png
          if-no-files-found: ignore

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PUBLIC_RELEASE: 'true'
      PUBLIC_SITE_URL: https://cyson21.github.io
      PUBLIC_RESUME_URL: https://github.com/cyson21/portfolio-hub/releases/download/latest/resume.pdf
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.3
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm exec playwright install --with-deps chromium
      - run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - run: pnpm build
      - run: pnpm test:e2e:release
        env:
          CI: true
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: release-playwright-artifacts
          path: |
            artifacts/playwright
            playwright-report
