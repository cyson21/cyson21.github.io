name: portfolio-web-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - run: pnpm build
      - run: pnpm test:privacy
      - run: pnpm test:links
      - run: pnpm test:e2e
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: preview-playwright-artifacts
          path: |
            artifacts/playwright
            playwright-report

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PUBLIC_RELEASE: 'true'
      PUBLIC_SITE_URL: https://cyson21.github.io
      PUBLIC_RESUME_URL: https://github.com/cyson21/portfolio-hub/releases/download/latest/resume.pdf
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - run: pnpm build
      - run: pnpm test:privacy
      - run: pnpm test:links
      - run: pnpm test:e2e:release
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: release-playwright-artifacts
          path: |
            artifacts/playwright
            playwright-report
